services:
  - type: web
    name: precosquin-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: REDIS_URL
        value: ""
      - key: CELERY_BROKER_URL
        value: ""
      - key: CELERY_RESULT_BACKEND
        value: ""
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        value: noreply@precosquin.com
      - key: SENDGRID_FROM_NAME
        value: Precosquin
      - key: FRONTEND_URL
        value: https://precosquin.com
      - key: API_URL
        value: https://precosquin-api.onrender.com
      - key: LOG_LEVEL
        value: info
